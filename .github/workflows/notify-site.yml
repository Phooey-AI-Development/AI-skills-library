name: Notify site to rebuild

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch rebuild event to site repo
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.SITE_REPO_DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Phooey-AI-Development/skill-library-site/dispatches \
            -d '{"event_type":"skills-updated","client_payload":{"source":"AI-skills-library","ref":"${{ github.sha }}"}}'
