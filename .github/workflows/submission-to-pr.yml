name: Convert submission to PR

on:
  issues:
    types: [opened, labeled]

jobs:
  convert:
    if: contains(github.event.issue.labels.*.name, 'skill-submission')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse issue body
        id: parse
        uses: stefanbuck/github-issue-parser@v3
        with:
          template-path: .github/ISSUE_TEMPLATE/submit-skill.yml

      - name: Validate skill name format
        id: validate
        env:
          SKILL_NAME: ${{ steps.parse.outputs.issueparser_skill-name }}
        run: |
          ERRORS=""
          if [[ ! "$SKILL_NAME" =~ ^[a-z0-9][a-z0-9-]*$ ]]; then
            ERRORS="Skill name must contain only lowercase letters, digits, and hyphens (no spaces, no capital letters, no special characters). You submitted: \`$SKILL_NAME\`"
          elif [[ ${#SKILL_NAME} -gt 64 ]]; then
            ERRORS="Skill name must be 64 characters or fewer. You submitted a name with ${#SKILL_NAME} characters."
          elif [[ -d "skills/$SKILL_NAME" ]]; then
            ERRORS="A skill named \`$SKILL_NAME\` already exists in the library. Please pick a more specific or differentiated name and submit again."
          fi

          if [ -n "$ERRORS" ]; then
            echo "validation_error<<EOF" >> $GITHUB_OUTPUT
            echo "$ERRORS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "failed=true" >> $GITHUB_OUTPUT
            echo "::error::$ERRORS"
          else
            echo "skill_name=$SKILL_NAME" >> $GITHUB_OUTPUT
            echo "failed=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment on issue if validation failed
        if: steps.validate.outputs.failed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const errorMsg = `${{ steps.validate.outputs.validation_error }}`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '⚠️ **Your submission couldn\'t be processed automatically.**',
                '',
                errorMsg,
                '',
                '---',
                '**What to do next:**',
                '1. Open a new submission with the correction — [click here to submit again](../../issues/new?template=submit-skill.yml).',
                '2. You can close this issue; no further action is needed here.',
                '',
                'If you think this is a mistake, comment below and a reviewer will take a look.'
              ].join('\n'),
            });

      - name: Stop if validation failed
        if: steps.validate.outputs.failed == 'true'
        run: exit 1

      - name: Create SKILL.md
        if: steps.validate.outputs.failed != 'true'
        env:
          SKILL_NAME: ${{ steps.parse.outputs.issueparser_skill-name }}
          DESCRIPTION: ${{ steps.parse.outputs.issueparser_description }}
          CATEGORY: ${{ steps.parse.outputs.issueparser_category }}
          OCCUPATION: ${{ steps.parse.outputs.issueparser_occupation }}
          TAGS: ${{ steps.parse.outputs.issueparser_tags }}
          INSTRUCTIONS: ${{ steps.parse.outputs.issueparser_instructions }}
          SUBMITTER_NAME: ${{ steps.parse.outputs.issueparser_submitter-name }}
          SUBMITTER_GH: ${{ github.event.issue.user.login }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          mkdir -p "skills/$SKILL_NAME"
          cat > "skills/$SKILL_NAME/SKILL.md" <<SKILL_EOF
          ---
          name: $SKILL_NAME
          description: $DESCRIPTION
          category: $CATEGORY
          occupation: $OCCUPATION
          tags: [$(echo "$TAGS" | sed 's/,/, /g')]
          status: draft
          metadata:
            author: $SUBMITTER_NAME
            submitted_by: $SUBMITTER_GH
            submitted_via: issue-#$ISSUE_NUM
          ---

          $INSTRUCTIONS
          SKILL_EOF

      - name: Create pull request
        if: steps.validate.outputs.failed != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: submission/issue-${{ github.event.issue.number }}
          commit-message: "Add skill: ${{ steps.parse.outputs.issueparser_skill-name }} (from #${{ github.event.issue.number }})"
          title: "New skill submission: ${{ steps.parse.outputs.issueparser_skill-name }}"
          body: |
            Auto-generated PR from issue #${{ github.event.issue.number }}.

            **Submitter:** @${{ github.event.issue.user.login }} (${{ steps.parse.outputs.issueparser_submitter-name }})
            **Category:** ${{ steps.parse.outputs.issueparser_category }}
            **Occupation:** ${{ steps.parse.outputs.issueparser_occupation }}

            ### Review checklist
            - [ ] Automated checks pass (see below)
            - [ ] Skill description is clear and accurate
            - [ ] Instructions are complete and unambiguous
            - [ ] No sensitive information (customer data, PHI, policy numbers)
            - [ ] Category and occupation are appropriate
            - [ ] Status upgraded from `draft` to `approved` if ready for production

            From #${{ github.event.issue.number }}
          labels: |
            skill-submission
            needs-review

      - name: Comment on issue with PR link
        if: steps.validate.outputs.failed != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Thanks for the submission! I've created a pull request with your skill: it will appear in the [Pull Requests tab](../../pulls) shortly.\n\nAutomated checks will run on the PR. A reviewer will get back to you once the checks pass.`
            });
